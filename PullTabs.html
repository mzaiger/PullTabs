<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pull Tabs</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1a1a2e;
            font-family: 'Arial Black', Impact, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 {
            font-size: 2rem;
            color: #ffd700;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
            font-weight: normal;
        }
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .pick-label {
            font-size: 1.1rem;
            color: #ffd700;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .tab-choices {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }
        .tab-choice {
            background: linear-gradient(145deg, #2d2d4e, #1e1e35);
            border: 3px solid #444;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .tab-choice:hover {
            border-color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
        }
        .tab-choice img {
            width: 100%;
            max-height: 90px;
            object-fit: contain;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .tab-choice .tab-num {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ffd700;
            color: #000;
            font-size: 1rem;
            font-weight: 900;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab-choice .tab-name {
            font-size: 0.8rem;
            color: #ccc;
            font-family: Arial, sans-serif;
        }
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .game-header {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 320px;
        }
        #back-btn {
            background: #2a2a4a;
            border: 2px solid #555;
            color: #ccc;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-family: 'Arial Black', Arial, sans-serif;
            font-weight: 900;
        }
        #back-btn:hover {
            background: #444;
            color: #fff;
        }
        #new-tab-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 1px;
            font-family: 'Arial Black', Arial, sans-serif;
        }
        #new-tab-btn:hover {
            transform: scale(1.05);
        }
        .open-all-btn-mob {
            background: #333;
            border: 2px solid #555;
            color: #bbb;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: Arial, sans-serif;
        }
        .open-all-btn-mob:hover {
            background: #555;
            color: #fff;
        }
        .result-banner {
            font-size: 1.2rem;
            font-weight: 900;
            text-align: center;
            padding: 8px 16px;
            border-radius: 10px;
            min-width: 110px;
            letter-spacing: 1px;
        }
        .result-banner.winner {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        .result-banner.no-win {
            background: #333;
            color: #888;
        }
        .result-banner.pending {
            background: #2a2a4a;
            color: #aaa;
            font-size: 0.85rem;
        }
        .pull-tab-card {
            position: relative;
            width: 300px;
            border-radius: 12px;
            overflow: visible;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            border: 3px solid #555;
        }
        .pull-tab-card .base-image {
            width: 100%;
            display: block;
        }
        .pt3-card {
            background: linear-gradient(180deg, #c9b98a 0%, #b89e6e 40%, #a8906a 100%);
        }
        .pt3-logo-header {
            width: 100%;
            display: block;
            padding: 0;
        }
        .grid-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 4px;
            padding: 2px 5px 4px 5px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .grid-inline {
            position: relative;
            left: auto;
            right: auto;
            bottom: auto;
            padding: 4px 5px 8px 5px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .tab-row {
            display: flex;
            gap: 3px;
            position: relative;
            flex: 1;
            min-height: 0;
        }
        .sym-cell {
            flex: 1;
            background: #e8e8e8;
            border-radius: 3px;
            border: 1.5px solid #bbb;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sym-cell img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }
        .pay-cell {
            width: 78px;
            min-width: 78px;
            background: #fff;
            border-radius: 3px;
            border: 1.5px solid #bbb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-size: 0.6rem;
            font-weight: 900;
            color: #333;
            text-align: center;
            padding: 1px;
            line-height: 1.1;
        }
        .pay-cell.winner-pay {
            background: #fffae0;
            color: #c00;
        }
        .row-cover {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #c0c0c0 0%, #ececec 50%, #c0c0c0 100%);
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid #999;
            z-index: 10;
            font-size: 0.6rem;
            color: #555;
            font-family: Arial, sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            user-select: none;
        }
        .row-cover:hover {
            background: linear-gradient(135deg, #aaa 0%, #ddd 50%, #aaa 100%);
        }
        .row-cover.removed {
            display: none;
        }
        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 84px;
            height: 5px;
            background: red;
            border-radius: 2px;
            transform: translateY(-50%);
            z-index: 5;
            display: none;
            pointer-events: none;
        }
        .open-all-btn {
            margin-top: 10px;
            background: #444;
            border: 2px solid #666;
            color: #ccc;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: Arial, sans-serif;
        }
        .open-all-btn:hover {
            background: #666;
            color: #fff;
        }
        .payout-legend {
            margin-top: 14px;
            background: #1e1e35;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px 16px;
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            color: #bbb;
            max-width: 300px;
            width: 100%;
        }
        .payout-legend h3 {
            color: #ffd700;
            font-size: 0.8rem;
            margin-bottom: 6px;
            text-align: center;
        }
        .payout-row-leg {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid #2a2a4a;
        }
        .payout-row-leg:last-child {
            border-bottom: none;
        }

        /* ===== DESKTOP 3-COLUMN LAYOUT ===== */
        @media (min-width: 700px) {
            #game-screen {
                flex-direction: row !important;
                align-items: flex-start !important;
                justify-content: center !important;
                gap: 28px !important;
                width: 100% !important;
            }
            .game-left-col {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
                min-width: 160px;
                max-width: 180px;
                padding-top: 8px;
            }
            .game-center-col {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .game-right-col {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
                min-width: 180px;
                max-width: 220px;
                padding-top: 8px;
            }
            .game-header {
                display: none !important;
            }
            .open-all-btn {
                display: none !important;
            }
            .payout-legend {
                display: none !important;
            }
        }

        /* Mobile: hide sidebar cols entirely, show original stacked elements */
        @media (max-width: 699px) {
            .game-left-col {
                display: none !important;
            }
            .game-right-col {
                display: none !important;
            }
            .game-center-col {
                display: contents;
            }
        }

        /* Desktop: hide the mobile-only elements inside center col */
        @media (min-width: 700px) {
            .game-center-col .payout-legend {
                display: none !important;
            }
            .game-center-col .game-header {
                display: none !important;
            }
        }

        /* Shared sidebar styles */
        .side-btn {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 900;
            letter-spacing: 1px;
            border: 2px solid #555;
            font-family: 'Arial Black', Arial, sans-serif;
            text-align: center;
            transition: all 0.15s;
        }
        .side-btn-back {
            background: #2a2a4a;
            color: #ccc;
            border-color: #555;
        }
        .side-btn-back:hover {
            background: #444;
            color: #fff;
        }
        .side-btn-new {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
        }
        .side-btn-new:hover {
            transform: scale(1.04);
        }
        .side-btn-open {
            background: #333;
            color: #bbb;
            border-color: #555;
        }
        .side-btn-open:hover {
            background: #555;
            color: #fff;
        }

        .side-result {
            font-size: 1.3rem;
            font-weight: 900;
            text-align: center;
            padding: 14px 10px;
            border-radius: 10px;
            letter-spacing: 1px;
        }
        .side-result.winner {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }
        .side-result.no-win {
            background: #333;
            color: #888;
        }
        .side-result.pending {
            background: #2a2a4a;
            color: #aaa;
            font-size: 0.9rem;
        }

        .side-legend {
            background: #1e1e35;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px 14px;
            font-family: Arial, sans-serif;
            font-size: 0.75rem;
            color: #bbb;
        }
        .side-legend h3 {
            color: #ffd700;
            font-size: 0.8rem;
            margin-bottom: 6px;
            text-align: center;
        }

        .menu-btn {
            position: fixed;
            top: 12px;
            right: 14px;
            z-index: 1000;
            background: #b8860b;
            border: 2px solid #ffd700;
            border-radius: 6px;
            color: #fff;
            width: 42px;
            height: 42px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
        }
        .menu-btn span {
            display: block;
            width: 22px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
        }
        .menu-dropdown {
            position: fixed;
            top: 60px;
            right: 14px;
            z-index: 1000;
            background: #1a1a2e;
            border: 2px solid #ffd700;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            display: none;
        }
        .menu-dropdown.open {
            display: block;
        }
        .menu-item {
            display: block;
            padding: 12px 20px;
            color: #ffd700;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 1px solid #333;
            transition: background 0.15s, color 0.15s;
            font-family: Arial, sans-serif;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: #b8860b;
            color: #fff;
        }
        .menu-item .mi-icon {
            margin-right: 8px;
        }

        /* ===== ISOLATED VIEW: all-games icon strip (?target=menu) ===== */
        #target-menu {
            display: none;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: #f5f0dc;
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .menu-icon-btn {
            width: 120px;
            height: 120px;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid #b8860b;
            background: #fff;
            transition: transform 0.15s;
        }
        .menu-icon-btn:hover {
            transform: scale(1.08);
        }
        .menu-icon-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Hamburger Menu -->
    <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <div class="menu-dropdown" id="menuDropdown">
        <a class="menu-item" href="?target=pulltab"><span class="mi-icon">🎰</span>Pull Tab</a>
        <a class="menu-item" href="?target=menu"><span class="mi-icon">🗂️</span>All Games</a>
    </div>

    <!-- All-games icon strip, shown only in the isolated ?target=menu view -->
    <div id="target-menu">
        <div class="menu-icon-btn" onclick="selectPullTab(1)"><img src="PullTab1Logo.png" alt="Tortoise vs Hare"></div>
        <div class="menu-icon-btn" onclick="selectPullTab(2)"><img src="PullTab2Logo.png" alt="American Summer"></div>
        <div class="menu-icon-btn" onclick="selectPullTab(3)"><img src="PullTab3Logo.png" alt="Pony Deluxe"></div>
        <div class="menu-icon-btn" onclick="selectPullTab(4)"><img src="PullTab4Logo.png" alt="Take Me To Your Pull Tabs"></div>
    </div>

    <h1>&#127920; PULL TABS</h1>
    <p class="subtitle">Choose your game &bull; $1 per tab</p>

    <div id="selection-screen">
        <div class="pick-label">&#8212; SELECT A PULL TAB GAME &#8212;</div>
        <div class="tab-choices">
            <div class="tab-choice" onclick="startGame(1)">
                <div class="tab-num">1</div>
                <img src="PullTab1Logo.png" alt="Tortoise vs Hare">
                <div class="tab-name">Tortoise vs. Hare</div>
            </div>
            <div class="tab-choice" onclick="startGame(2)">
                <div class="tab-num">2</div>
                <img src="PullTab2Logo.png" alt="American Summer">
                <div class="tab-name">American Summer</div>
            </div>
            <div class="tab-choice" onclick="startGame(3)">
                <div class="tab-num">3</div>
                <img src="PullTab3Logo.png" alt="Pony Deluxe">
                <div class="tab-name">Pony Deluxe</div>
            </div>
            <div class="tab-choice" onclick="startGame(4)">
                <div class="tab-num">4</div>
                <img src="PullTab4Logo.png" alt="Take Me To Your Pull Tabs">
                <div class="tab-name">Take Me To Your Pull Tabs</div>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <!-- Mobile header (hidden on desktop) -->
        <div class="game-header">
            <button id="back-btn" onclick="goBack()">&#8592; Back</button>
            <button id="new-tab-btn" onclick="newTab()">New Tab &#127903;</button>
            <button class="open-all-btn-mob" onclick="openAll()">Open All Rows</button>
            <div id="result-display" class="result-banner pending">Pull rows to play</div>
        </div>

        <!-- LEFT SIDEBAR (desktop only) -->
        <div class="game-left-col">
            <button class="side-btn side-btn-back" onclick="goBack()">&#8592; Back</button>
            <button class="side-btn side-btn-new" onclick="newTab()">New Tab &#127903;</button>
            <button class="side-btn side-btn-open" onclick="openAll()">Open All</button>
        </div>

        <!-- CENTER: the card -->
        <div class="game-center-col">
            <div class="pull-tab-card" id="tab-card" data-target="pulltab">
                <img class="base-image" id="base-img" src="" alt="Pull Tab" style="display:block;">
                <div id="pt3-logo-wrap" style="display:none; padding:0;">
                    <img id="pt3-logo-img" src="" style="width:100%;display:block;">
                </div>
                <div class="grid-overlay" id="grid-overlay"></div>
            </div>
            <!-- Mobile-only payout legend -->
            <div class="payout-legend">
                <h3 id="legend-title">&#127942; PRIZE TABLE (3 of a kind)</h3>
                <div id="legend-rows"></div>
            </div>
        </div>

        <!-- RIGHT SIDEBAR (desktop only) -->
        <div class="game-right-col">
            <div id="result-display-d" class="side-result pending">Pull rows to play</div>
            <div class="side-legend">
                <h3>&#127942; PRIZE TABLE (3 of a kind)</h3>
                <div id="legend-rows-d"></div>
            </div>
        </div>
    </div>

    <script>
        var PAYOUTS = [{ "prize": 500, "odds": 1 }, { "prize": 100, "odds": 5 }, { "prize": 20, "odds": 10 },
            { "prize": 10, "odds": 20 }, { "prize": 5, "odds": 20 }, { "prize": 2, "odds": 20 }, { "prize": 1,
                "odds": 30 }
        ];
        var PRIZE_LABELS = ['$500', '$100', '$20', '$10', '$5', '$2', '$1'];
        var GAME_PRIZE_LABELS = {
            "1": ["$500 (Trophy)", "$100 (Flag)", "$20 (Turtle)", "$10 (Hare)", "$5 (Clock)", "$2 (Beer)",
                "$1 (Shots)"
            ],
            "2": ["$500 (Popsicle)", "$100 (Hot Dog)", "$20 (Bottle)", "$10 (Glasses)", "$5 (Baseball)",
                "$2 (Can)", "$1 (Beach Ball)"
            ],
            "3": ["$500 (Laurel)", "$100 (Trophy)", "$20 (Horse)", "$10 (Helmet)", "$5 (Gloves)", "$2 (Saddle)",
                "$1 (Horseshoe)"
            ],
            "4": ["$500 (Alien)", "$100 (Earth)", "$20 (Space Bar)", "$10 (Planet)", "$5 (UFO Disc)",
                "$2 (Meteor)", "$1 (Abduction)"
            ]
        };
        var IMAGES = {
            1: ['PullTab1Image1.png', 'PullTab1Image2.png', 'PullTab1Image3.png', 'PullTab1Image4.png',
                'PullTab1Image5.png', 'PullTab1Image6.png', 'PullTab1Image7.png'
            ],
            2: ['PullTab2Image1.png', 'PullTab2Image2.png', 'PullTab2Image3.png', 'PullTab2Image4.png',
                'PullTab2Image5.png', 'PullTab2Image6.png', 'PullTab2Image7.png'
            ],
            3: ['PullTab3Image1.png', 'PullTab3Image2.png', 'PullTab3Image3.png', 'PullTab3Image4.png',
                'PullTab3Image5.png', 'PullTab3Image6.png', 'PullTab3Image7.png'
            ],
            4: ['PullTab4Image1.png', 'PullTab4Image2.png', 'PullTab4Image3.png', 'PullTab4Image4.png',
                'PullTab4Image5.png', 'PullTab4Image6.png', 'PullTab4Image7.png'
            ]
        };
        var BASE_IMAGES = {
            1: 'PullTab1BaseImage.jpg',
            2: 'PullTab2BaseImage.jpg',
            3: 'PullTab3BaseImage.jpg',
            4: 'PullTab4BaseImage.jpg'
        };
        var PT3_LOGO = 'PullTab3Logo.png';

        var currentGame = 1;
        var currentWin = 0;
        var rowsOpened = 0;
        var currentRows = [];
        var TOTAL_ROWS = 7;
        var openedRows = [];

        // ===== STATE PERSISTENCE =====
        function saveState() {
            try {
                localStorage.setItem('ptState', JSON.stringify({
                    currentGame: currentGame,
                    currentRows: currentRows,
                    openedRows: openedRows,
                    currentWin: currentWin,
                    rowsOpened: rowsOpened
                }));
            } catch (e) {}
        }

        function loadState() {
            try {
                var s = localStorage.getItem('ptState');
                if (!s) return false;
                var d = JSON.parse(s);
                currentGame = d.currentGame || 1;
                currentRows = d.currentRows || [];
                openedRows = d.openedRows || [];
                currentWin = d.currentWin || 0;
                rowsOpened = d.rowsOpened || 0;
                return true;
            } catch (e) { return false; }
        }

        // ===== MENU =====
        function toggleMenu() {
            document.getElementById('menuDropdown').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            var btn = document.getElementById('menuBtn');
            var dd = document.getElementById('menuDropdown');
            if (btn && dd && !btn.contains(e.target) && !dd.contains(e.target)) {
                dd.classList.remove('open');
            }
        });

        // ===== ISOLATED VIEW (?target=pulltab / ?target=menu) =====
        (function() {
            var params = new URLSearchParams(window.location.search);
            var target = params.get('target');
            if (target !== 'pulltab' && target !== 'menu') return;

            var style = document.createElement('style');
            style.textContent = [
                'body > * { display: none !important; }',
                'body { display:flex; align-items:center; justify-content:center;',
                '        padding:0; min-height:100vh; background:#1a1a2e; }',
                '#isolated-view { display:flex !important; align-items:center;',
                '                 justify-content:center; width:100vw; min-height:100vh; }'
            ].join('');
            document.head.appendChild(style);

            var wrap = document.createElement('div');
            wrap.id = 'isolated-view';
            document.body.appendChild(wrap);

            window.addEventListener('DOMContentLoaded', function() {
                if (target === 'menu') {
                    var menuEl = document.getElementById('target-menu');
                    if (menuEl) {
                        menuEl.style.display = 'flex';
                        wrap.appendChild(menuEl);
                    }
                    return;
                }

                var savedRaw = null;
                try { savedRaw = localStorage.getItem('ptState'); } catch (e) {}

                if (savedRaw) {
                    var d = JSON.parse(savedRaw);
                    if (d.currentRows && d.currentRows.length > 0) {
                        currentGame = d.currentGame || 1;
                        currentRows = d.currentRows;
                        openedRows = d.openedRows || [];
                        currentWin = d.currentWin || 0;
                        rowsOpened = d.rowsOpened || 0;
                        applyGameVisuals(currentGame);
                        var card = document.getElementById('tab-card');
                        if (card) wrap.appendChild(card);
                        renderGrid();
                        return;
                    }
                }
            });
        })();

        // ===== GAME LOGIC =====
        function goBack() {
            document.getElementById('selection-screen').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'none';
            saveState();
        }

        function applyGameVisuals(n) {
            var baseImg = document.getElementById('base-img');
            var pt3wrap = document.getElementById('pt3-logo-wrap');
            var card = document.getElementById('tab-card');
            var overlay = document.getElementById('grid-overlay');

            baseImg.style.display = 'block';
            baseImg.src = BASE_IMAGES[n];
            pt3wrap.style.display = 'none';
            card.className = 'pull-tab-card';
            overlay.className = 'grid-overlay';
            overlay.style.position = 'absolute';
            var logoTops = { 1: 198, 2: 181, 3: 188, 4: 204 };
            overlay.style.top = (logoTops[n] || 190) + 'px';
            overlay.style.bottom = '4px';

            var labels = GAME_PRIZE_LABELS[String(n)];
            var prizes = ['$500', '$100', '$20', '$10', '$5', '$2', '$1'];

            var legendRows = document.getElementById('legend-rows');
            if (legendRows) {
                legendRows.innerHTML = '';
                for (var i = 0; i < 7; i++) {
                    var d = document.createElement('div');
                    d.className = 'payout-row-leg';
                    d.innerHTML = '<span>' + labels[i] + '</span><span style="color:#ffd700">' + prizes[i] +
                        '</span>';
                    legendRows.appendChild(d);
                }
            }
            var legendRowsD = document.getElementById('legend-rows-d');
            if (legendRowsD) {
                legendRowsD.innerHTML = '';
                for (var j = 0; j < 7; j++) {
                    var d2 = document.createElement('div');
                    d2.className = 'payout-row-leg';
                    d2.innerHTML = '<span>' + labels[j] + '</span><span style="color:#ffd700">' + prizes[j] +
                        '</span>';
                    legendRowsD.appendChild(d2);
                }
            }
        }

        function startGame(n) {
            currentGame = n;
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            applyGameVisuals(n);
            generateTab();
        }

        // Used by the ?target=menu icon strip — picks a game so that when the
        // player navigates to the full page (or another arcade page) it
        // resumes with the pull tab they selected.
        function selectPullTab(n) {
            startGame(n);
        }

        function generateTab() {
            rowsOpened = 0;
            openedRows = [];
            currentWin = 0;
            currentRows = [];
            for (var i = 0; i < TOTAL_ROWS; i++) currentRows.push({ symbols: [0, 0, 0], isWin: false, prize: 0 });
            var usedRows = {};
            for (var imgIdx = 0; imgIdx < 7; imgIdx++) {
                var prob = PAYOUTS[imgIdx].odds / (100 * 7);
                if (Math.random() < prob) {
                    var row, tries = 0;
                    do { row = Math.floor(Math.random() * TOTAL_ROWS);
                        tries++; } while (usedRows[row] && tries < 20);
                    if (!usedRows[row]) {
                        usedRows[row] = true;
                        currentRows[row] = { symbols: [imgIdx, imgIdx, imgIdx], isWin: true,
                        prize: PAYOUTS[imgIdx].prize };
                    }
                }
            }
            for (var r = 0; r < TOTAL_ROWS; r++) {
                if (!currentRows[r].isWin) {
                    var syms;
                    do {
                        syms = [Math.floor(Math.random() * 7), Math.floor(Math.random() * 7), Math.floor(Math
                        .random() * 7)];
                    } while (syms[0] === syms[1] && syms[1] === syms[2]);
                    currentRows[r].symbols = syms;
                }
            }
            currentWin = currentRows.reduce(function(s, r) { return s + r.prize; }, 0);
            renderGrid();
            updateResult(false);
            saveState();
        }

        function renderGrid() {
            var overlay = document.getElementById('grid-overlay');
            overlay.innerHTML = '';
            var imgs = IMAGES[currentGame];
            for (var r = 0; r < TOTAL_ROWS; r++) {
                var row = currentRows[r];
                var rowDiv = document.createElement('div');
                rowDiv.className = 'tab-row';
                rowDiv.id = 'row-' + r;
                for (var c = 0; c < 3; c++) {
                    var cell = document.createElement('div');
                    cell.className = 'sym-cell';
                    var img = document.createElement('img');
                    img.src = imgs[row.symbols[c]];
                    cell.appendChild(img);
                    rowDiv.appendChild(cell);
                }
                var payCell = document.createElement('div');
                payCell.className = 'pay-cell' + (row.isWin ? ' winner-pay' : '');
                payCell.innerHTML = row.isWin ? '<b>' + PRIZE_LABELS[row.symbols[0]] + '<br>WINNER!</b>' :
                    'NO<br>WINNER';
                rowDiv.appendChild(payCell);
                if (row.isWin) {
                    var line = document.createElement('div');
                    line.className = 'win-line';
                    line.id = 'winline-' + r;
                    rowDiv.appendChild(line);
                }
                var cover = document.createElement('div');
                cover.className = 'row-cover';
                cover.id = 'cover-' + r;
                cover.innerHTML = '&#9660; PULL';
                (function(rr) { cover.onclick = function() { openRow(rr); }; })(r);
                rowDiv.appendChild(cover);
                overlay.appendChild(rowDiv);
            }

            for (var i = 0; i < openedRows.length; i++) {
                var rr = openedRows[i];
                var cover2 = document.getElementById('cover-' + rr);
                if (cover2) cover2.classList.add('removed');
                if (currentRows[rr].isWin) {
                    var winline = document.getElementById('winline-' + rr);
                    if (winline) winline.style.display = 'block';
                }
            }
        }

        function openRow(r) {
            var cover = document.getElementById('cover-' + r);
            if (!cover || cover.classList.contains('removed')) return;
            cover.classList.add('removed');
            rowsOpened++;
            openedRows.push(r);
            if (currentRows[r].isWin) {
                var line = document.getElementById('winline-' + r);
                if (line) line.style.display = 'block';
            }
            if (rowsOpened === TOTAL_ROWS) finishTab();
            else { updateResult(false);
                saveState(); }
        }

        function openAll() {
            for (var r = 0; r < TOTAL_ROWS; r++) {
                var cover = document.getElementById('cover-' + r);
                if (cover && !cover.classList.contains('removed')) {
                    cover.classList.add('removed');
                    rowsOpened++;
                    openedRows.push(r);
                    if (currentRows[r].isWin) {
                        var line = document.getElementById('winline-' + r);
                        if (line) line.style.display = 'block';
                    }
                }
            }
            finishTab();
        }

        function finishTab() {
            updateResult(true);
            saveState();
        }

        function updateResult(done) {
            var cls, txt;
            if (!done) {
                var rem = TOTAL_ROWS - rowsOpened;
                cls = 'pending';
                txt = rem + ' rows left';
            } else {
                if (currentWin > 0) { cls = 'winner';
                    txt = 'WIN $' + currentWin + '!'; } else { cls = 'no-win';
                    txt = 'No Winner'; }
            }
            var el = document.getElementById('result-display');
            if (el) { el.className = 'result-banner ' + cls;
                el.textContent = txt; }
            var eld = document.getElementById('result-display-d');
            if (eld) { eld.className = 'side-result ' + cls;
                eld.textContent = txt; }
        }

        function newTab() { generateTab(); }

        // ===== INIT: restore state on load =====
        (function() {
            var wasOpen = loadState();
            if (wasOpen && currentRows.length > 0) {
                document.getElementById('selection-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                applyGameVisuals(currentGame);
                renderGrid();
                var allOpen = (rowsOpened === TOTAL_ROWS);
                updateResult(allOpen);
            }
        })();
    </script>

</body>
</html>
