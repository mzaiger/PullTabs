<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6">
<title>Pull Tabs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── CENTER POPUP ── */
  .center-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .center-popup.show { display: flex; }
  .center-popup-inner {
    background: #0e0c00;
    border: 3px solid #ffd700;
    border-radius: 18px;
    padding: 28px 48px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #ffd700;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,215,0,0.35), 0 8px 40px rgba(0,0,0,0.9);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 80vw;
    line-height: 1.4;
  }
  .center-popup.win .center-popup-inner  { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 60px rgba(0,255,136,0.35), 0 8px 40px rgba(0,0,0,0.9); }
  .center-popup.lose .center-popup-inner { border-color: #ff3344; color: #ff3344; box-shadow: 0 0 60px rgba(255,51,68,0.35), 0 8px 40px rgba(0,0,0,0.9); }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── BLOCKED OVERLAY ── */
  .blocked-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .blocked-overlay.show { display: flex; }
  .blocked-overlay .bo-msg {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #ff3344;
    letter-spacing: 2px;
  }
  .blocked-overlay .bo-sub {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #664444;
    letter-spacing: 1px;
  }
  .btn-go-wallet {
    display: inline-block;
    background: #0a0a00;
    border: 2px solid #ffd700;
    color: #ffd700;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .btn-go-wallet:hover { transform: scale(1.05); }

  /* ── GAME IFRAME ── */
  .game-wrap { width: 100%; flex: 1; }
  .game-wrap iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
    background: #1a1a2e;
  }
</style>
</head>
<body>

<!-- CENTER POPUP -->
<div class="center-popup" id="centerPopup">
  <div class="center-popup-inner" id="centerPopupMsg"></div>
</div>

<!-- BLOCKED OVERLAY -->
<div class="blocked-overlay" id="blockedOverlay">
  <div style="font-size:48px">⛔</div>
  <div class="bo-msg">OUT OF CREDITS</div>
  <div class="bo-sub">You need at least $1.00 to play Pull Tabs.</div>
  <a class="btn-go-wallet" href="../wallet/index.html">GO TO WALLET</a>
</div>

<!-- THE GAME -->
<div class="game-wrap">
  <iframe id="pullFrame" src="PullTabs.html" title="Pull Tabs" allowtransparency="true"></iframe>
</div>

<script>
const WALLET_KEY = 'arcade_wallet';

function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
function setBalance(val) {
  const clamped = Math.max(0, Math.round(val * 100) / 100);
  localStorage.setItem(WALLET_KEY, String(clamped));
  return clamped;
}

let _popTmr;
function popup(msg, type) {
  const el = document.getElementById('centerPopup');
  const msgEl = document.getElementById('centerPopupMsg');
  msgEl.textContent = msg;
  el.className = 'center-popup show ' + (type || '');
  clearTimeout(_popTmr);
  _popTmr = setTimeout(() => el.classList.remove('show'), 3500);
}

function renderHud() {
  const bal = getBalance();
  const blocked = document.getElementById('blockedOverlay');
  if (bal <= 0) blocked.classList.add('show');
  else blocked.classList.remove('show');
}

// ─── PATCH IFRAME ONCE ON LOAD ────────────────────────────────────────────────
document.getElementById('pullFrame').addEventListener('load', function() {
  try {
    const fw = this.contentWindow;
    setTimeout(function() { patchIframe(fw); }, 250);
  } catch(e) {}
});

function patchIframe(fw) {
  try {
    // ── CHARGE PATCH on generateTab ───────────────────────────────────────────
    if (typeof fw.generateTab === 'function' && !fw._walletPatched) {
      const origGenerate = fw.generateTab;

      fw.generateTab = function() {
        if (fw._walletPrepaid) {
          fw._walletPrepaid = false;
          origGenerate.call(fw);
          return;
        }
        const bal = getBalance();
        if (bal <= 0) { renderHud(); return; }
        const newBal = setBalance(bal - 1);
        renderHud();
        popup('-$1.00  ·  Balance: $' + newBal, '');
        origGenerate.call(fw);
      };

      fw._walletPatched = true;
    }

    // ── WIN PATCH on finishTab ─────────────────────────────────────────────────
    // Guard: once finishTab fires for a given statsPlayed count, never credit again.
    // This prevents "Open All" repeated-click double-pays.
    if (typeof fw.finishTab === 'function' && !fw._walletWinPatched) {
      const origFinish = fw.finishTab;

      fw.finishTab = function() {
        // If already finished this tab, do nothing
        if (fw._tabFinished) return;
        fw._tabFinished = true;

        origFinish.call(fw);

        const prize = fw.currentWin;
        const playCount = fw.statsPlayed;

        if (playCount === fw._lastCreditedPlay) return;
        fw._lastCreditedPlay = playCount;

        if (prize > 0) {
          const newBal = setBalance(getBalance() + prize);
          renderHud();
          popup('🎉  Pull Tab WIN  $' + prize + '!\nBalance: $' + newBal, 'win');
        }
      };

      // Also patch generateTab to reset _tabFinished for each new tab
      if (fw._walletPatched) {
        const alreadyPatched = fw.generateTab;
        fw.generateTab = function() {
          fw._tabFinished = false;
          alreadyPatched.call(fw);
        };
      }

      fw._walletWinPatched = true;
      fw._lastCreditedPlay = fw.statsPlayed || 0;
      fw._tabFinished = false;
    }

  } catch(e) {
    console.warn('[Wallet] patchIframe error:', e);
  }
}

renderHud();
</script>
</body>
</html>
