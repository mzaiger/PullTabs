<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pull Tab Emulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; font-family: 'Arial Black', Impact, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #fff; }
h1 { font-size: 2rem; color: #ffd700; text-shadow: 2px 2px 4px #000; margin-bottom: 6px; letter-spacing: 2px; }
.subtitle { color: #aaa; font-size: 0.85rem; margin-bottom: 20px; font-family: Arial, sans-serif; font-weight: normal; }
#selection-screen { display: flex; flex-direction: column; align-items: center; width: 100%; }
.pick-label { font-size: 1.1rem; color: #ffd700; margin-bottom: 16px; letter-spacing: 1px; }
.tab-choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 600px; width: 100%; }
.tab-choice { background: linear-gradient(145deg, #2d2d4e, #1e1e35); border: 3px solid #444; border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; position: relative; overflow: hidden; }
.tab-choice:hover { border-color: #ffd700; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,215,0,0.3); }
.tab-choice img { width: 100%; max-height: 90px; object-fit: contain; border-radius: 8px; margin-bottom: 8px; }
.tab-choice .tab-num { position: absolute; top: 8px; right: 8px; background: #ffd700; color: #000; font-size: 1rem; font-weight: 900; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.tab-choice .tab-name { font-size: 0.8rem; color: #ccc; font-family: Arial, sans-serif; }
#game-screen { display: none; flex-direction: column; align-items: center; width: 100%; }
.game-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; width: 100%; max-width: 520px; justify-content: space-between; }
#back-btn { background: #333; border: 2px solid #555; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-family: Arial, sans-serif; }
#back-btn:hover { background: #555; }
#new-tab-btn { background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; color: #000; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 900; letter-spacing: 1px; }
#new-tab-btn:hover { transform: scale(1.05); }
.result-banner { font-size: 1.2rem; font-weight: 900; text-align: center; padding: 8px 16px; border-radius: 10px; min-width: 110px; letter-spacing: 1px; }
.result-banner.winner { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 0 20px rgba(255,215,0,0.6); }
.result-banner.no-win { background: #333; color: #888; }
.result-banner.pending { background: #2a2a4a; color: #aaa; font-size: 0.85rem; }
.pull-tab-card { position: relative; width: 300px; border-radius: 12px; overflow: visible; box-shadow: 0 8px 30px rgba(0,0,0,0.6); border: 3px solid #555; }
.pull-tab-card .base-image { width: 100%; display: block; }
/* For pt3 with no base image, show a themed placeholder behind the logo */
.pt3-card { background: linear-gradient(180deg, #c9b98a 0%, #b89e6e 40%, #a8906a 100%); }
.pt3-logo-header { width: 100%; display: block; padding: 0; }
.grid-overlay { position: absolute; left: 0; right: 0; bottom: 4px; padding: 2px 5px 4px 5px; display: flex; flex-direction: column; gap: 2px; }
/* For pt3, grid is not absolute but normal flow */
.grid-inline { position: relative; left: auto; right: auto; bottom: auto; padding: 4px 5px 8px 5px; display: flex; flex-direction: column; gap: 3px; }
.tab-row { display: flex; gap: 3px; position: relative; flex: 1; min-height: 0; }
.sym-cell { flex: 1; background: #e8e8e8; border-radius: 3px; border: 1.5px solid #bbb; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
.sym-cell img { width: 90%; height: 90%; object-fit: contain; }
.pay-cell { width: 78px; min-width: 78px; background: #fff; border-radius: 3px; border: 1.5px solid #bbb; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; font-size: 0.6rem; font-weight: 900; color: #333; text-align: center; padding: 1px; line-height: 1.1; }
.pay-cell.winner-pay { background: #fffae0; color: #c00; }
.row-cover { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #c0c0c0 0%, #ececec 50%, #c0c0c0 100%); border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1.5px solid #999; z-index: 10; font-size: 0.6rem; color: #555; font-family: Arial, sans-serif; font-weight: bold; letter-spacing: 1px; user-select: none; }
.row-cover:hover { background: linear-gradient(135deg, #aaa 0%, #ddd 50%, #aaa 100%); }
.row-cover.removed { display: none; }
.win-line { position: absolute; top: 50%; left: 0; right: 84px; height: 5px; background: red; border-radius: 2px; transform: translateY(-50%); z-index: 5; display: none; pointer-events: none; }
.open-all-btn { margin-top: 10px; background: #444; border: 2px solid #666; color: #ccc; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: Arial, sans-serif; }
.open-all-btn:hover { background: #666; color: #fff; }
.stats-bar { margin-top: 12px; display: flex; gap: 16px; font-family: Arial, sans-serif; font-size: 0.8rem; color: #aaa; flex-wrap: wrap; justify-content: center; }
.stats-bar span { color: #ffd700; font-weight: bold; }
.payout-legend { margin-top: 14px; background: #1e1e35; border: 1px solid #444; border-radius: 10px; padding: 10px 16px; font-family: Arial, sans-serif; font-size: 0.75rem; color: #bbb; max-width: 300px; width: 100%; }
.payout-legend h3 { color: #ffd700; font-size: 0.8rem; margin-bottom: 6px; text-align: center; }
.payout-row-leg { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #2a2a4a; }
.payout-row-leg:last-child { border-bottom: none; }
</style>
</head>
<body>
<h1>&#127920; PULL TAB EMULATOR</h1>
<p class="subtitle">Choose your game &bull; $1 per tab</p>
<div id="selection-screen">
  <div class="pick-label">&#8212; SELECT A PULL TAB GAME &#8212;</div>
  <div class="tab-choices">
    <div class="tab-choice" onclick="startGame(1)">
      <div class="tab-num">1</div>
      <img src="PullTab1Logo.png" alt="Tortoise vs Hare">
      <div class="tab-name">Tortoise vs. Hare</div>
    </div>
    <div class="tab-choice" onclick="startGame(2)">
      <div class="tab-num">2</div>
      <img src="PullTab2Logo.png" alt="American Summer">
      <div class="tab-name">American Summer</div>
    </div>
    <div class="tab-choice" onclick="startGame(3)">
      <div class="tab-num">3</div>
      <img src="PullTab3Logo.png" alt="Pony Deluxe">
      <div class="tab-name">Pony Deluxe</div>
    </div>
    <div class="tab-choice" onclick="startGame(4)">
      <div class="tab-num">4</div>
      <img src="PullTab4Logo.png" alt="Take Me To Your Pull Tabs">
      <div class="tab-name">Take Me To Your Pull Tabs</div>
    </div>
  </div>
</div>
<div id="game-screen">
  <div class="game-header">
    <button id="back-btn" onclick="goBack()">&#8592; Back</button>
    <div id="result-display" class="result-banner pending">Pull rows to play</div>
    <button id="new-tab-btn" onclick="newTab()">New Tab &#127903;</button>
  </div>
  <div class="pull-tab-card" id="tab-card">
    <img class="base-image" id="base-img" src="" alt="Pull Tab" style="display:block;">
    <div id="pt3-logo-wrap" style="display:none; padding:0;">
      <img id="pt3-logo-img" src="" style="width:100%;display:block;">
    </div>
    <div class="grid-overlay" id="grid-overlay"></div>
  </div>
  <button class="open-all-btn" onclick="openAll()">Open All Rows</button>
  <div class="stats-bar">
    Tabs played: <span id="stat-played">0</span>&nbsp;&nbsp;
    Total won: $<span id="stat-won">0</span>&nbsp;&nbsp;
    Last win: $<span id="stat-last">&#8212;</span>
  </div>
  <div class="payout-legend">
    <h3 id="legend-title">&#127942; PRIZE TABLE (3 of a kind)</h3>
    <div id="legend-rows"></div>
  </div>
</div>
<script>
var PAYOUTS = [{"prize": 500, "odds": 1}, {"prize": 100, "odds": 5}, {"prize": 20, "odds": 10}, {"prize": 10, "odds": 20}, {"prize": 5, "odds": 20}, {"prize": 2, "odds": 20}, {"prize": 1, "odds": 30}];
var PRIZE_LABELS = ['$500','$100','$20','$10','$5','$2','$1'];
var GAME_PRIZE_LABELS = {"1": ["$500 (Trophy)", "$100 (Flag)", "$20 (Turtle)", "$10 (Hare)", "$5 (Clock)", "$2 (Beer)", "$1 (Shots)"], "2": ["$500 (Popsicle)", "$100 (Hot Dog)", "$20 (Bottle)", "$10 (Glasses)", "$5 (Baseball)", "$2 (Can)", "$1 (Beach Ball)"], "3": ["$500 (Laurel)", "$100 (Trophy)", "$20 (Horse)", "$10 (Helmet)", "$5 (Gloves)", "$2 (Saddle)", "$1 (Horseshoe)"], "4": ["$500 (Alien)", "$100 (Earth)", "$20 (Space Bar)", "$10 (Planet)", "$5 (UFO Disc)", "$2 (Meteor)", "$1 (Abduction)"]};
var IMAGES = {
  1: ['PullTab1Image1.png','PullTab1Image2.png','PullTab1Image3.png','PullTab1Image4.png','PullTab1Image5.png','PullTab1Image6.png','PullTab1Image7.png'],
  2: ['PullTab2Image1.png','PullTab2Image2.png','PullTab2Image3.png','PullTab2Image4.png','PullTab2Image5.png','PullTab2Image6.png','PullTab2Image7.png'],
  3: ['PullTab3Image1.png','PullTab3Image2.png','PullTab3Image3.png','PullTab3Image4.png','PullTab3Image5.png','PullTab3Image6.png','PullTab3Image7.png'],
  4: ['PullTab4Image1.png','PullTab4Image2.png','PullTab4Image3.png','PullTab4Image4.png','PullTab4Image5.png','PullTab4Image6.png','PullTab4Image7.png']
};
var BASE_IMAGES = {
  1: 'PullTab1BaseImage.jpg',
  2: 'PullTab2BaseImage.jpg',
  3: 'PullTab3BaseImage.jpg',
  4: 'PullTab4BaseImage.jpg'
};
var PT3_LOGO = 'PullTab3Logo.png';

var currentGame = 1;
var statsPlayed = 0, statsWon = 0, currentWin = 0, rowsOpened = 0;
var currentRows = [];
var TOTAL_ROWS = 7;

function goBack() {
  document.getElementById('selection-screen').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
}

function startGame(n) {
  currentGame = n;
  document.getElementById('selection-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';

  var baseImg = document.getElementById('base-img');
  var pt3wrap = document.getElementById('pt3-logo-wrap');
  var card = document.getElementById('tab-card');
  var overlay = document.getElementById('grid-overlay');

  baseImg.style.display = 'block';
  baseImg.src = BASE_IMAGES[n];
  pt3wrap.style.display = 'none';
  card.className = 'pull-tab-card';
  overlay.className = 'grid-overlay';
  overlay.style.position = 'absolute';
  // Position grid to start just below the logo area
  var logoTops = {1: 198, 2: 181, 3: 188, 4: 204};
  overlay.style.top = (logoTops[n] || 190) + 'px';
  overlay.style.bottom = '4px';

  // Update legend
  var legendRows = document.getElementById('legend-rows');
  legendRows.innerHTML = '';
  var labels = GAME_PRIZE_LABELS[String(n)];
  var prizes = ['$500','$100','$20','$10','$5','$2','$1'];
  for (var i = 0; i < 7; i++) {
    var d = document.createElement('div');
    d.className = 'payout-row-leg';
    d.innerHTML = '<span>' + labels[i] + '</span><span style="color:#ffd700">' + prizes[i] + '</span>';
    legendRows.appendChild(d);
  }

  generateTab();
}

function generateTab() {
  rowsOpened = 0;
  currentWin = 0;
  currentRows = [];
  for (var i = 0; i < TOTAL_ROWS; i++) currentRows.push({symbols:[0,0,0], isWin:false, prize:0});
  var usedRows = {};
  for (var imgIdx = 0; imgIdx < 7; imgIdx++) {
    var prob = PAYOUTS[imgIdx].odds / (100 * 7);
    if (Math.random() < prob) {
      var row, tries = 0;
      do { row = Math.floor(Math.random() * TOTAL_ROWS); tries++; }
      while (usedRows[row] && tries < 20);
      if (!usedRows[row]) {
        usedRows[row] = true;
        currentRows[row] = {symbols:[imgIdx,imgIdx,imgIdx], isWin:true, prize:PAYOUTS[imgIdx].prize};
      }
    }
  }
  for (var r = 0; r < TOTAL_ROWS; r++) {
    if (!currentRows[r].isWin) {
      var syms;
      do {
        syms = [Math.floor(Math.random()*7), Math.floor(Math.random()*7), Math.floor(Math.random()*7)];
      } while (syms[0]===syms[1] && syms[1]===syms[2]);
      currentRows[r].symbols = syms;
    }
  }
  currentWin = currentRows.reduce(function(s,r){return s+r.prize;}, 0);
  renderGrid();
  updateResult(false);
}

function renderGrid() {
  var overlay = document.getElementById('grid-overlay');
  overlay.innerHTML = '';
  var imgs = IMAGES[currentGame];
  for (var r = 0; r < TOTAL_ROWS; r++) {
    var row = currentRows[r];
    var rowDiv = document.createElement('div');
    rowDiv.className = 'tab-row';
    rowDiv.id = 'row-' + r;
    for (var c = 0; c < 3; c++) {
      var cell = document.createElement('div');
      cell.className = 'sym-cell';
      var img = document.createElement('img');
      img.src = imgs[row.symbols[c]];
      cell.appendChild(img);
      rowDiv.appendChild(cell);
    }
    var payCell = document.createElement('div');
    payCell.className = 'pay-cell' + (row.isWin ? ' winner-pay' : '');
    payCell.innerHTML = row.isWin ? '<b>' + PRIZE_LABELS[row.symbols[0]] + '<br>WINNER!</b>' : 'NO<br>WINNER';
    rowDiv.appendChild(payCell);
    if (row.isWin) {
      var line = document.createElement('div');
      line.className = 'win-line';
      line.id = 'winline-' + r;
      rowDiv.appendChild(line);
    }
    var cover = document.createElement('div');
    cover.className = 'row-cover';
    cover.id = 'cover-' + r;
    cover.innerHTML = '&#9660; PULL';
    (function(rr){ cover.onclick = function(){ openRow(rr); }; })(r);
    rowDiv.appendChild(cover);
    overlay.appendChild(rowDiv);
  }
}

function openRow(r) {
  var cover = document.getElementById('cover-' + r);
  if (!cover || cover.classList.contains('removed')) return;
  cover.classList.add('removed');
  rowsOpened++;
  if (currentRows[r].isWin) {
    var line = document.getElementById('winline-' + r);
    if (line) line.style.display = 'block';
  }
  if (rowsOpened === TOTAL_ROWS) finishTab();
  else updateResult(false);
}

function openAll() {
  for (var r = 0; r < TOTAL_ROWS; r++) {
    var cover = document.getElementById('cover-' + r);
    if (cover && !cover.classList.contains('removed')) {
      cover.classList.add('removed');
      rowsOpened++;
      if (currentRows[r].isWin) {
        var line = document.getElementById('winline-' + r);
        if (line) line.style.display = 'block';
      }
    }
  }
  finishTab();
}

function finishTab() {
  statsPlayed++;
  statsWon += currentWin;
  document.getElementById('stat-played').textContent = statsPlayed;
  document.getElementById('stat-won').textContent = statsWon;
  document.getElementById('stat-last').textContent = currentWin > 0 ? currentWin : '&#8212;';
  updateResult(true);
}

function updateResult(done) {
  var el = document.getElementById('result-display');
  if (!done) {
    var rem = TOTAL_ROWS - rowsOpened;
    el.className = 'result-banner pending';
    el.textContent = rem + ' rows left';
  } else {
    if (currentWin > 0) {
      el.className = 'result-banner winner';
      el.textContent = 'WIN $' + currentWin + '!';
    } else {
      el.className = 'result-banner no-win';
      el.textContent = 'No Winner';
    }
  }
}

function newTab() { generateTab(); }
</script>
</body>
</html>
