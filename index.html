<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6">
<title>Pull Tabs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .center-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .center-popup.show { display: flex; }
  .center-popup-inner {
    background: #0e0c00;
    border: 3px solid #ffd700;
    border-radius: 18px;
    padding: 28px 48px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #ffd700;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,215,0,0.35), 0 8px 40px rgba(0,0,0,0.9);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 80vw;
    line-height: 1.4;
  }
  .center-popup.win .center-popup-inner  { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 60px rgba(0,255,136,0.35), 0 8px 40px rgba(0,0,0,0.9); }
  .center-popup.lose .center-popup-inner { border-color: #ff3344; color: #ff3344; }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .blocked-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .blocked-overlay.show { display: flex; }
  .blocked-overlay .bo-msg {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #ff3344;
    letter-spacing: 2px;
  }
  .blocked-overlay .bo-sub {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #664444;
    letter-spacing: 1px;
  }
  .btn-go-wallet {
    display: inline-block;
    background: #0a0a00;
    border: 2px solid #ffd700;
    color: #ffd700;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .btn-go-wallet:hover { transform: scale(1.05); }

  .game-wrap { width: 100%; flex: 1; }
  .game-wrap iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
    background: #1a1a2e;
  }
</style>
</head>
<body>

<div class="center-popup" id="centerPopup">
  <div class="center-popup-inner" id="centerPopupMsg"></div>
</div>

<div class="blocked-overlay" id="blockedOverlay">
  <div style="font-size:48px">⛔</div>
  <div class="bo-msg">OUT OF CREDITS</div>
  <div class="bo-sub">You need at least $1.00 to play Pull Tabs.</div>
  <a class="btn-go-wallet" href="../wallet/index.html">GO TO WALLET</a>
</div>

<div class="game-wrap">
  <iframe id="pullFrame" src="" title="Pull Tabs" allowtransparency="true"></iframe>
</div>

<script>
// Forward this page's query string (e.g. ?target=pulltab / ?target=menu)
// through to the inner game so isolated-view links keep working via index.html
document.getElementById('pullFrame').src = 'PullTabs.html' + window.location.search;

const WALLET_KEY = 'arcade_wallet';

function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
function setBalance(val) {
  const clamped = Math.max(0, Math.round(val * 100) / 100);
  localStorage.setItem(WALLET_KEY, String(clamped));
  return clamped;
}

let _popTmr;
function popup(msg, type) {
  const el = document.getElementById('centerPopup');
  const msgEl = document.getElementById('centerPopupMsg');
  msgEl.textContent = msg;
  el.className = 'center-popup show ' + (type || '');
  clearTimeout(_popTmr);
  _popTmr = setTimeout(() => el.classList.remove('show'), 3500);
}

function renderHud() {
  const bal = getBalance();
  if (bal <= 0) document.getElementById('blockedOverlay').classList.add('show');
  else document.getElementById('blockedOverlay').classList.remove('show');
}

// ── Was there already an open tab when the page loaded? ──────────────────────
// Read ptState BEFORE the iframe loads and can modify it.
// ptState.screenOpen === true means a tab was already open from a previous visit.
function wasTabAlreadyOpen() {
  try {
    const s = localStorage.getItem('ptState');
    if (!s) return false;
    const d = JSON.parse(s);
    return !!d.screenOpen;
  } catch(e) { return false; }
}

// Check this once right now, before the iframe even loads.
const TAB_WAS_PRELOADED = wasTabAlreadyOpen();

function patchIframe(fw) {
  try {
    // ── SESSION FLAG: did we generate a new tab this session? ────────────────
    // This is the single source of truth for whether finishTab should pay.
    // It starts false. generateTab sets it true. finishTab resets it to false.
    // If the user returns to a pre-existing open tab and hits Open All,
    // this flag is false → no payout.
    fw._tabPaidThisSession = false;

    // ── CHARGE PATCH on generateTab ──────────────────────────────────────────
    if (typeof fw.generateTab === 'function' && !fw._walletPatched) {
      const origGenerate = fw.generateTab;
      fw.generateTab = function() {
        const bal = getBalance();
        if (bal <= 0) { renderHud(); return; }
        const newBal = setBalance(bal - 1);
        renderHud();
        popup('-$1.00  ·  Balance: $' + newBal, '');
        fw._tabPaidThisSession = true; // mark: this tab was bought in this session
        origGenerate.call(fw);
      };
      fw._walletPatched = true;
    }

    // ── WIN PATCH on finishTab ────────────────────────────────────────────────
    if (typeof fw.finishTab === 'function' && !fw._walletWinPatched) {
      const origFinish = fw.finishTab;
      fw.finishTab = function() {
        const wasPaid = fw._tabPaidThisSession;
        fw._tabPaidThisSession = false; // reset — next tab needs its own purchase
        origFinish.call(fw); // let game update statsPlayed + currentWin

        // Only credit if we actually paid for this tab in this session
        if (!wasPaid) return;

        const prize = fw.currentWin;
        if (prize > 0) {
          const newBal = setBalance(getBalance() + prize);
          renderHud();
          popup('🎉  Pull Tab WIN  $' + prize + '!\nBalance: $' + newBal, 'win');
        }
      };
      fw._walletWinPatched = true;
    }

  } catch(e) {
    console.warn('[Wallet] patchIframe error:', e);
  }
}

document.getElementById('pullFrame').addEventListener('load', function() {
  try {
    const fw = this.contentWindow;
    setTimeout(function() { patchIframe(fw); }, 250);
  } catch(e) {}
});

renderHud();
</script>
</body>
</html>
